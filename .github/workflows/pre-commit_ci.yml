name: Validate with pre-commit

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-python@v7
      with:
        python-version: 3.13
    - run: |
        pip install pre-commit
        pre-commit run --show-diff-on-failure --color=always --all-files
